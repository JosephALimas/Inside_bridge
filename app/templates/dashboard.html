{% extends "base.html" %}

{% block title %}Dashboard | Inside Bridge{% endblock %}

{% block content %}
<div class="d-flex flex-column flex-md-row justify-content-between gap-3 align-items-md-center mb-4">
  <div>
    <h1 class="h3 mb-1">Dashboard</h1>
    <p class="text-secondary mb-0">Sesion iniciada como {{ current_user.name }}.</p>
  </div>
  <span class="badge text-bg-primary align-self-start align-self-md-center">{{ current_user.role.name }}</span>
</div>

<div class="row g-3">
  <div class="col-md-4">
    <div class="card h-100">
      <div class="card-body">
        <h2 class="h6 text-secondary">Correo</h2>
        <p class="mb-0 fw-semibold">{{ current_user.email }}</p>
      </div>
    </div>
  </div>
  <div class="col-md-4">
    <div class="card h-100">
      <div class="card-body">
        <h2 class="h6 text-secondary">Rol</h2>
        <p class="mb-0 fw-semibold">{{ current_user.role.description }}</p>
      </div>
    </div>
  </div>
  <div class="col-md-4">
    <div class="card h-100">
      <div class="card-body">
        <h2 class="h6 text-secondary">Estado</h2>
        <p class="mb-0 fw-semibold">Activo</p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
