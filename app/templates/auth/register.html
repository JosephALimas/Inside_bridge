{% extends "base.html" %}

{% block title %}Registro | Inside Bridge{% endblock %}

{% block content %}
<div class="auth-shell mx-auto">
  <h1 class="h3 mb-3">Crear cuenta</h1>
  <form method="post" class="card">
    <div class="card-body">
      <div class="mb-3">
        <label for="name" class="form-label">Nombre</label>
        <input class="form-control" id="name" name="name" type="text" autocomplete="name" required>
      </div>
      <div class="mb-3">
        <label for="email" class="form-label">Correo</label>
        <input class="form-control" id="email" name="email" type="email" autocomplete="email" required>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Contrasena</label>
        <input class="form-control" id="password" name="password" type="password" autocomplete="new-password" required>
      </div>
      <button class="btn btn-primary w-100" type="submit">Crear cuenta</button>
    </div>
  </form>
  <p class="text-secondary mt-3 mb-0">Ya tienes cuenta? <a href="{{ url_for('auth.login') }}">Entra aqui</a></p>
</div>
{% endblock %}
